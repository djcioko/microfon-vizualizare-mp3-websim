<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Visualizer</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="ui">
    <div class="controls">
      <input id="file-input" type="file" accept="audio/*,video/*" multiple>
      <button id="playpause">Play</button>
      <button id="stop">Stop</button>
      <select id="audio-device"><option value="">🎤 Default Mic</option></select>
      <button id="mic-listen">🎤 Listen Mic</button>
      <input id="overlay-text" type="text" placeholder="Text..." maxlength="80">
      <button id="apply-text">Add Text</button>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <script src="./app.js"></script>
</body>
</html>
</html>
