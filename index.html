<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Custom Visualizer</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="ui">
    <div class="controls">
      <label class="button"> + Add Clip <input id="file-input" type="file" accept="audio/*,video/*" multiple hidden> </label>
      <button id="playpause">Play</button>
      <button id="stop">Stop</button>
      
      <label class="inline">
        <input id="overlay-text" type="text" placeholder="Text peste..." maxlength="80">
      </label>
      <button id="apply-text">Adaugă Text</button>
    </div>
    <ul id="clip-list"></ul>
  </div>
  <canvas id="canvas"></canvas>
  <script type="module" src="./app.js"></script>
</body>
</html>
